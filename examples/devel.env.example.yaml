# stint env-config template.
#
# Copy this to `.stint/<env>.yaml` (e.g. `.stint/devel.yaml`) and edit the
# values. `.stint/` is gitignored on purpose: connection config is per
# developer. Secrets never go in this file — the API token and account email
# are read from environment variables (STINT_TOKEN / STINT_USER by default).
#
#   mkdir -p .stint
#   cp examples/devel.env.example.yaml .stint/devel.yaml
#   # then edit .stint/devel.yaml and export the two secrets:
#   export STINT_USER='you@example.com'   # Jira Cloud account email
#   export STINT_TOKEN='...'              # https://id.atlassian.com/manage-profile/security/api-tokens
#
# Recognized keys (all optional; CLI flags override): url, dialect, auth,
# token_env, user_env, verify_ssl.

# Your Jira Cloud base URL, prefixed with the dialect.
url: jira_cloud+https://YOURSITE.atlassian.net

# Cloud uses API-token auth (email + token, sent basic-style).
auth: api-token

# Override these only if your secrets live in differently-named env vars.
# token_env: STINT_TOKEN
# user_env: STINT_USER
